<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prognos AI | المحرك البرمجي الأعظم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ai-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="p-4 md:p-10 bg-slate-950">
    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-500 mb-2">Prognos AI 🧠</h1>
            <p class="text-slate-400">نظام متصل بعلم البشرية الشامل</p>
        </header>

        <div class="glass rounded-3xl p-6 shadow-2xl flex flex-col h-[550px]">
            <div id="chat-history" class="flex-grow space-y-4 mb-4 overflow-y-auto p-2 scroll-smooth">
                <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20 text-blue-100">
                    <strong>نظام Prognos:</strong> جاهز للعمل. ماذا سنبرمج اليوم؟
                </div>
            </div>
            
            <div class="relative">
                <input id="user-input" type="text" 
                    class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 pl-20 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" 
                    placeholder="اطلب أي كود...">
                <button onclick="sendMessage()" 
                    class="absolute left-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-500 text-white px-6 rounded-xl font-bold transition-all">
                    إرسال
                </button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const history = document.getElementById('chat-history');
            const text = input.value.trim();
            if(!text) return;

            history.innerHTML += `<div class="bg-slate-800 p-4 rounded-2xl text-slate-200 self-end ml-10"><strong>أنت:</strong> ${text}</div>`;
            input.value = "";
            history.scrollTop = history.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                
                history.innerHTML += `
                    <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20 text-blue-50 ai-glow">
                        <strong>Prognos AI:</strong> ${data.reply.replace(/\n/g, '<br>')}
                    </div>`;
            } catch (e) {
                history.innerHTML += `<div class="text-red-400 text-center text-sm">خطأ في الاتصال.. جرب مرة أخرى</div>`;
            }
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
