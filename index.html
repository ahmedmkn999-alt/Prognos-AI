<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prognos AI | المحرك البرمجي الأعظم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ai-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        #chat-history::-webkit-scrollbar { width: 5px; }
        #chat-history::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 mb-3">Prognos AI 🧠</h1>
            <p class="text-slate-400 text-lg">مستقبل البرمجة المتصل بعلم البشرية الشامل</p>
        </header>

        <div class="glass rounded-3xl p-6 shadow-2xl flex flex-col h-[600px] border border-blue-500/20">
            <div id="chat-history" class="flex-grow space-y-4 mb-4 overflow-y-auto p-2">
                <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20 text-blue-100">
                    <strong>نظام Prognos:</strong> أهلاً بك يا صانع المستقبل. لقد استوعبت "علم البشرية" من مستودعات GitHub وأنا الآن جاهز لبناء أي مشروع تطلبه بمقاييس عام 2026. ماذا نبرمج؟
                </div>
            </div>
            
            <div class="relative mt-auto">
                <textarea id="user-input" 
                    class="w-full bg-slate-900/80 border border-slate-700 rounded-2xl p-4 pr-16 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all resize-none" 
                    rows="2"
                    placeholder="اطلب كوداً، حل مشكلة، أو تحديث للملفات..."></textarea>
                <button onclick="sendMessage()" 
                    class="absolute left-3 bottom-3 bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg transition-transform active:scale-95">
                    إرسال
                </button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mt-6">
            <div class="glass p-4 rounded-2xl text-center">
                <div class="text-xs text-slate-500 uppercase tracking-widest mb-1">المحرك</div>
                <div class="text-sm font-bold text-blue-400">Llama 3.1 70B</div>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <div class="text-xs text-slate-500 uppercase tracking-widest mb-1">قاعدة البيانات</div>
                <div class="text-sm font-bold text-green-400">GitHub Master</div>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <div class="text-xs text-slate-500 uppercase tracking-widest mb-1">الحالة</div>
                <div class="text-sm font-bold text-cyan-400">Online 2026</div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "Gsk_SlOHmDbCYSxCoWq5jEJ2WGdyb3FYxS6ahhMtdINS9PQCYNQVvwLT";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const history = document.getElementById('chat-history');
            const userText = input.value.trim();
            
            if(!userText) return;

            // عرض رسالة المستخدم
            history.innerHTML += `
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 text-slate-200 self-end ml-10">
                    <strong>أنت:</strong> ${userText}
                </div>
            `;
            input.value = "";
            history.scrollTop = history.scrollHeight;

            // إرسال الطلب لـ Groq
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-70b-versatile",
                        messages: [
                            {
                                role: "system", 
                                content: "أنت Prognos AI، محرك ذكاء اصطناعي خارق. وظيفتك مساعدة المطورين بناءً على 'علم البشرية' المجمع من GitHub. اجعل إجاباتك تقنية، احترافية، وباللغة العربية."
                            },
                            {role: "user", content: userText}
                        ],
                        temperature: 0.7
                    })
                });
                
                const data = await response.json();
                const aiReply = data.choices[0].message.content;
                
                // عرض رد الـ AI
                history.innerHTML += `
                    <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20 text-blue-50 ai-glow">
                        <strong>Prognos AI:</strong> ${aiReply.replace(/\n/g, '<br>')}
                    </div>
                `;
            } catch (error) {
                history.innerHTML += `<div class="text-red-400 text-center text-sm">عذراً، فشل الاتصال بالمخ المركزي. تأكد من اتصال الإنترنت.</div>`;
            }
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
